<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Pramuka</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="login-container">

    <!-- FORM -->
    <div class="login-form">
      <img src="WhatsApp Image 2026-04-05 at 11.45.42.jpeg" class="logo">

      <form onsubmit="return login(event)">
        <input type="text" id="username" placeholder="Nomor KTA (16 digit)" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">MASUK</button>
      </form>

      <p id="error" style="color:red;"></p>
    </div>

    <!-- IMAGE -->
    <div class="login-image">
     
    </div>

  </div>

  <script>
    async function login(e) {
      e.preventDefault();

      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const error = document.getElementById('error');

      error.innerText = '';

      // VALIDASI KTA (HARUS 16 ANGKA)
      if (!/^[0-9]{16}$/.test(user)) {
        error.innerText = 'Nomor KTA salah (harus 16 angka)';
        return false;
      }

      // PASSWORD
      if (pass !== 'prapastam') {
        error.innerText = 'Password salah!';
        return false;
      }

      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        console.log('IP Kamu:', data.ip);

        // SIMPAN LOGIN
        localStorage.setItem('login', 'true');

        // PINDAH HALAMAN
        window.location.href = '../dasboard/index.html';

      } catch (err) {
        error.innerText = 'Gagal koneksi!';
      }
    }
  </script>

</body>

</html>
